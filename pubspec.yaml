name: life_maintenance
description: An offline-first life maintenance tracker app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2
  # Local storage
  shared_preferences: ^2.2.3
  # Navigation
  go_router: ^14.0.0
  # Date formatting
  intl: ^0.19.0
  # JSON serialization
  json_annotation: ^4.9.0
  # Icons
  cupertino_icons: ^1.0.8
  # Cross-platform file picking (used for JSON import)
  file_picker: ^10.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
